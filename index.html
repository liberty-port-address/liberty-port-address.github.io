<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liberty Port Address</title>
  <style>
    /* --- Reset a základní styl --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0b0d15;
      color: #f0f4ff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- Kontejner pro parallax efekt --- */
    .parallax-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* --- Tečkový raster (parallax vrstva) --- */
    .dot-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 120%; /* o něco vyšší pro plynulý pohyb */
      background-image: radial-gradient(circle, rgba(100, 180, 255, 0.5) 1.5px, transparent 1.5px);
      background-size: 40px 40px;
      background-position: 0 0;
      will-change: transform;
      z-index: 0;
      pointer-events: none; /* aby tečky nerušily klikání */
    }

    /* --- Druhá vrstva teček (jemnější, pomalejší) --- */
    .dot-grid-slow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 120%;
      background-image: radial-gradient(circle, rgba(180, 220, 255, 0.25) 1px, transparent 1px);
      background-size: 70px 70px;
      background-position: 10px 10px;
      will-change: transform;
      z-index: 0;
      pointer-events: none;
    }

    /* --- Obsah (nad tečkami) --- */
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 900px;
      margin: 0 1rem;
      background: rgba(11, 13, 21, 0.55);
      backdrop-filter: blur(6px);
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.8);
      transition: transform 0.2s ease;
    }

    .content h1 {
      font-size: clamp(2.8rem, 12vw, 5.8rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #b8d6ff, #7aa9ff, #4a7fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(74, 127, 255, 0.2);
      margin-bottom: 0.5rem;
      line-height: 1.1;
    }

    .content .sub {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.3em;
      font-weight: 300;
      text-transform: uppercase;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 1.2rem;
      margin-top: 0.5rem;
      display: inline-block;
    }

    .content p {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 1.8rem;
      line-height: 1.7;
      font-weight: 300;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    /* --- patička (volitelná) --- */
    .footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.1em;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(4px);
      border-top: 1px solid rgba(255, 255, 255, 0.03);
    }

    /* --- Responzivní doladění --- */
    @media (max-width: 640px) {
      .content {
        background: rgba(11, 13, 21, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 1.8rem;
        padding: 2rem 1.2rem;
      }
      .dot-grid {
        background-size: 28px 28px;
      }
      .dot-grid-slow {
        background-size: 50px 50px;
      }
    }
  </style>
</head>
<body>

  <!-- HLAVNÍ SEKCE S PARALLAXEM -->
  <section class="parallax-container">

    <!-- Tečkový raster – rychlejší vrstva -->
    <div class="dot-grid" id="dotGrid"></div>

    <!-- Tečkový raster – pomalejší vrstva -->
    <div class="dot-grid-slow" id="dotGridSlow"></div>

    <!-- Obsah -->
    <div class="content">
      <h1>Liberty Port<br>Address</h1>
      <span class="sub">✦ digitální přístav ✦</span>
      <p>
        Vítejte na místě, kde se setkává svoboda, technologie a adresa.<br>
        Každá tečka je signálem.
      </p>
    </div>
  </section>

  <!-- Patička (jen pro dokreslení) -->
  <div class="footer">
    © 2026 Liberty Port Address – plachtění v síti
  </div>

  <script>
    (function() {
      // --- Elementy ---
      const grid = document.getElementById('dotGrid');
      const gridSlow = document.getElementById('dotGridSlow');

      // --- Proměnné pro sledování pohybu myši ---
      let mouseX = 0;
      let mouseY = 0;
      let currentX = 0;
      let currentY = 0;
      let currentXSlow = 0;
      let currentYSlow = 0;

      // --- Rychlost paralaxu (čím vyšší, tím větší pohyb) ---
      const SPEED = 0.035;    // pro rychlejší vrstvu
      const SPEED_SLOW = 0.018; // pro pomalejší vrstvu

      // --- Inicializace pozice myši (střed) ---
      mouseX = window.innerWidth / 2;
      mouseY = window.innerHeight / 2;

      // --- Funkce pro update pozice teček ---
      function updateGrid() {
        // plynulé vyhlazení (lerp)
        currentX += (mouseX - currentX) * 0.08;
        currentY += (mouseY - currentY) * 0.08;

        currentXSlow += (mouseX - currentXSlow) * 0.05;
        currentYSlow += (mouseY - currentYSlow) * 0.05;

        // Posun oproti středu (takže tečky "utíkají" opačným směrem než myš)
        const offsetX = (currentX / window.innerWidth - 0.5) * 2;
        const offsetY = (currentY / window.innerHeight - 0.5) * 2;

        const offsetXSlow = (currentXSlow / window.innerWidth - 0.5) * 2;
        const offsetYSlow = (currentYSlow / window.innerHeight - 0.5) * 2;

        // Aplikace transformace
        grid.style.transform = `translate(${offsetX * 20 * SPEED * 100}px, ${offsetY * 20 * SPEED * 100}px)`;
        gridSlow.style.transform = `translate(${offsetXSlow * 20 * SPEED_SLOW * 100}px, ${offsetYSlow * 20 * SPEED_SLOW * 100}px)`;

        requestAnimationFrame(updateGrid);
      }

      // --- Detekce pohybu myši ---
      function onMouseMove(e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
      }

      // --- Detekce pohybu na dotykových zařízeních (touch) ---
      function onTouchMove(e) {
        if (e.touches.length > 0) {
          mouseX = e.touches[0].clientX;
          mouseY = e.touches[0].clientY;
        }
      }

      // --- Resize okna – upraví referenční hodnoty ---
      function onResize() {
        // není potřeba nic speciálního, ale necháme pro jistotu
      }

      // --- Spuštění ---
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('touchmove', onTouchMove);
      window.addEventListener('resize', onResize);

      // Nastavíme počáteční pozici myši na střed
      mouseX = window.innerWidth / 2;
      mouseY = window.innerHeight / 2;

      // Spustíme animační smyčku
      updateGrid();

      // --- (volitelné) zrušení posluchačů při odchodu (pro čistotu) ---
      // window.addEventListener('beforeunload', function() {
      //   window.removeEventListener('mousemove', onMouseMove);
      //   window.removeEventListener('touchmove', onTouchMove);
      // });
    })();
  </script>

</body>
</html>
